<!doctype html>
<html lang="zh-Hant">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>每日展示</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="topbar">
<div class="wrap topbar-inner">

<div>
<div class="eyebrow">DAILY SHOWCASE</div>
<h1>每日展示</h1>
</div>

<div class="update-box" id="updateDate">
更新日期：-- / -- / --
</div>

</div>
</header>

<main class="wrap page">

<section class="toolbar">

<div class="tabs" id="tabs"></div>

<div class="summary" id="summary">
共 42 筆展示
</div>

</section>

<section class="grid" id="cardGrid"></section>

</main>

<!-- modal -->

<div class="modal" id="modal" aria-hidden="true">

<div class="modal-backdrop" id="modalClose"></div>

<div class="modal-panel">

<button class="modal-x" id="modalX">×</button>

<img id="modalImg">

<div class="modal-info">

<div class="modal-name" id="modalName"></div>

<div class="modal-stats" id="modalStats"></div>

<div class="modal-badge" id="modalBadge"></div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
